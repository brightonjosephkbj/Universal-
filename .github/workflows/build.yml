name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Install dependencies
        run: npm ci

      - name: Prebuild Android
        run: ./node_modules/.bin/expo prebuild --platform android --no-install

      - name: Fix Gradle Java compatibility
        run: |
          echo "org.gradle.jvmargs=-Xmx4g" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Upgrade Gradle wrapper to 8.6
        run: |
          cd android
          sed -i 's/gradle-7.6.3-all/gradle-8.6-all/' gradle/wrapper/gradle-wrapper.properties

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Universal-App-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
